<!DOCTYPE html>
<html lang="th">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .glass-bg { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        body { background: #0a0a0a; color: white; }
    </style>
</head>
<body class="p-10" x-data="{ tab: 'wellesley' }">

    <div class="flex justify-center gap-4 mb-8">
        <button @click="tab = 'wellesley'" :class="tab === 'wellesley' ? 'bg-blue-600' : 'bg-gray-800'" class="px-6 py-2 rounded-lg">Wellesley</button>
        <button @click="tab = 'kodomo'" :class="tab === 'kodomo' ? 'bg-blue-600' : 'bg-gray-800'" class="px-6 py-2 rounded-lg">Kodomo</button>
    </div>

    <div class="grid grid-cols-3 gap-4 max-w-4xl mx-auto">
        
        <template x-if="tab === 'wellesley'">
            <div class="col-span-3 grid grid-cols-3 gap-4">
                <div class="glass-bg p-4 rounded-xl border border-white/10">Joseph Wellesley</div>
                <div class="glass-bg p-4 rounded-xl border border-white/10">Moomin Wellesley</div>
                <div class="glass-bg p-4 rounded-xl border border-white/10">Best Wellesley</div>
            </div>
        </template>

        <template x-if="tab === 'kodomo'">
            <div class="col-span-3 grid grid-cols-3 gap-4">
                <div class="glass-bg p-4 rounded-xl border border-white/10">Gus Kodomo</div>
                <div class="glass-bg p-4 rounded-xl border border-white/10">SayHan Kodomo</div>
                <div class="glass-bg p-4 rounded-xl border border-white/10">Fong Kodomo</div>
            </div>
        </template>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASTIEN</title>
    <link rel="icon" type="image/png" href="https://img1.pic.in.th/images/cgtlogo2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { 
            --primary: #f3d48b; 
            --bg-dark: #0a0a0b; 
            --card-bg: rgba(25, 25, 30, 0.6); 
            --border-color: rgba(255, 255, 255, 0.08); 
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Rajdhani', 'Kanit', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased; /* ทำให้ตัวอักษรเนียนขึ้น */
        }
        
        nav { 
            display: flex; justify-content: space-between; padding: 15px 5%; 
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-color); 
        }
        
        #brand-name { font-weight: 900; letter-spacing: 2px; font-family: 'Orbitron'; font-size: 1.2rem; color: var(--primary); display: flex; align-items: center; gap: 15px; }
        
        #searchBar { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); 
            padding: 8px 15px; border-radius: 20px; color: #fff; width: 150px; 
            transition: var(--transition); 
        }
        #searchBar:focus { width: 220px; border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(243, 212, 139, 0.2); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .glass-panel { 
            background: var(--card-bg); backdrop-filter: blur(15px); 
            border: 1px solid var(--border-color); border-radius: 20px; 
            padding: 25px; margin-bottom: 30px; 
        }
        
        .member-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            padding: 15px; display: flex; align-items: center; gap: 15px; 
            border-radius: 16px; transition: var(--transition); will-change: transform;
        }
        .member-card:hover { 
            transform: translateY(-5px) scale(1.02); 
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .avatar-box { 
            width: 65px; height: 65px; background-size: cover; background-position: center; 
            border-radius: 50%; border: 2px solid var(--primary);
            image-rendering: -webkit-optimize-contrast; /* ทำให้รูปชัดขึ้น */
            box-shadow: 0 0 10px rgba(243, 212, 139, 0.3);
        }

        .btn-action { 
            background: var(--primary); color: #000; border: none; padding: 10px 20px; 
            border-radius: 10px; font-weight: 700; cursor: pointer; transition: var(--transition); 
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(243, 212, 139, 0.3); }

        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    </style>
</head>
<body>
    <nav>
        <div id="brand-name">
            ORIGINAL BASTIEN
            <input type="text" id="searchBar" placeholder="ค้นหาสมาชิก..." onkeyup="filterMembers()">
        </div>
        <div>
            <button onclick="showView('memberView')" class="btn-action" style="background: rgba(255,255,255,0.05); color: #fff;"><i class="fas fa-home"></i> HOME</button>
            <button onclick="checkAdminStatus()" id="navAdmin" class="btn-action"><i class="fas fa-user-shield"></i> ADMIN</button>
        </div>
    </nav>

    <div class="container">
        <section id="adminLoginView" class="hidden">
            <div style="max-width: 400px; margin: auto;" class="glass-panel">
                <h2>ADMIN LOGIN</h2>
                <input type="text" id="adminUser" placeholder="Username" style="margin-bottom: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 10px; color: #fff; width: 90%; border-radius: 8px;">
                <input type="password" id="adminPass" placeholder="Password" style="margin-bottom: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 10px; color: #fff; width: 90%; border-radius: 8px;">
                <button onclick="handleLogin()" class="btn-action" style="width: 100%;">LOGIN</button>
            </div>
        </section>

        <section id="memberView">
            <div id="adminPanel" class="hidden glass-panel">
                <h3>จัดการสมาชิก</h3>
                <div class="admin-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px;">
                    <input type="text" id="newName" placeholder="ชื่อ-นามสกุล">
                    <input type="text" id="newImg" placeholder="URL รูป">
                    <input type="text" id="newFB" placeholder="ลิงก์ Facebook">
                    <select id="newRole" style="background: rgba(0,0,0,0.4); color: #fff; padding: 10px; border-radius: 8px;"><option value="leader">Leader</option><option value="member">Member</option></select>
                </div>
                <button onclick="saveMember()" class="btn-action">บันทึกสมาชิก</button>
            </div>

            <div id="memberCountDisplay" style="margin-bottom: 20px; text-align: right;">
                <i class="fas fa-users"></i> <span id="totalMembers">0</span>
            </div>

            <div id="rosterDisplay">
                <div class="section-title" id="titleLeader">LEADERS</div>
                <div class="grid" id="leaderGrid" style="margin-bottom: 40px;"></div>
                <div class="section-title" id="titleMember">MEMBERS</div>
                <div class="grid" id="memberGrid"></div>
            </div>
        </section>
    </div>

    <script>
        // คง Script เดิมไว้เนื่องจากทำงานได้ดีอยู่แล้ว เพียงแค่ปรับปรุง UI
        const firebaseConfig = { databaseURL: "https://bastienstyle-3d598-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DEFAULT_IMG = "https://img2.pic.in.th/10809a679b865d80c09.png";
        let isAdmin = false;
        let memberData = [];

        function showView(v) {
            document.getElementById('memberView').classList.toggle('hidden', v !== 'memberView');
            document.getElementById('adminLoginView').classList.toggle('hidden', v !== 'adminLoginView');
        }

        function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if(u === "originalbastien" && p === "1975stylestan") {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('navAdmin').innerText = "LOGOUT";
                showView('memberView');
            } else { alert("รหัสผิด"); }
        }

        function checkAdminStatus() { if(isAdmin) location.reload(); else showView('adminLoginView'); }

        function filterMembers() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            renderGrid(memberData.filter(m => m.name.toLowerCase().includes(query)));
        }

        function renderGrid(dataArray) {
            const leaderGrid = document.getElementById('leaderGrid');
            const memberGrid = document.getElementById('memberGrid');
            leaderGrid.innerHTML = "";
            memberGrid.innerHTML = "";
            
            dataArray.forEach(item => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <div class="avatar-box" style="background-image: url('${item.img || DEFAULT_IMG}')"></div>
                    <div style="flex:1">
                        <span class="role-tag" style="font-family: 'Orbitron'; font-size: 0.6rem; padding: 2px 8px; border-radius: 20px; background: var(--primary); color: #000;">${item.role.toUpperCase()}</span>
                        <div style="font-weight:700; margin-top: 5px;">${item.name}</div>
                        <a href="${item.fb}" target="_blank" style="color:var(--primary); text-decoration:none; font-size: 0.8rem;">FACEBOOK</a>
                    </div>
                    ${isAdmin ? `<button onclick="deleteMember('${item.id}')" style="background:none; border:none; color:#ff4d4d; cursor:pointer;"><i class="fas fa-trash"></i></button>` : ''}
                `;
                if(item.role === 'leader') leaderGrid.appendChild(card);
                else memberGrid.appendChild(card);
            });
        }

        function renderRoster() {
            db.ref('roster').on('value', snap => {
                const data = snap.val() || {};
                memberData = Object.keys(data).map(id => ({id, ...data[id]}));
                document.getElementById('totalMembers').innerText = memberData.length;
                renderGrid(memberData);
            });
        }

        function saveMember() {
            const data = {
                name: document.getElementById('newName').value,
                img: document.getElementById('newImg').value || DEFAULT_IMG,
                fb: document.getElementById('newFB').value,
                role: document.getElementById('newRole').value
            };
            if(!data.name) return alert("ใส่ชื่อด้วย");
            db.ref('roster').push(data);
            alert("บันทึกสำเร็จ");
        }

        function deleteMember(id) { if(confirm("ลบ?")) db.ref('roster/' + id).remove(); }
        renderRoster();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .glass-card:hover { border: 1px solid #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body class="p-8">

    <!-- Header -->
    <header class="flex justify-between items-center mb-12">
        <h1 class="text-3xl font-bold tracking-tighter italic">WELLSLEY</h1>
        <nav class="space-x-6">
            <a href="#" class="hover:text-blue-500">HOME</a>
            <a href="#" class="hover:text-blue-500">SERVICES</a>
            <a href="#" class="hover:text-blue-500">CONTACT</a>
        </nav>
    </header>

    <!-- Main Grid -->
    <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Card 1 -->
        <div class="glass-card p-6 rounded-2xl">
            <h2 class="text-xl font-semibold mb-2">Service Name</h2>
            <p class="text-gray-400 text-sm">รายละเอียดบริการของคุณที่นี่ เน้นความเรียบง่ายและดูทันสมัย</p>
        </div>
        
        <!-- Card 2 -->
        <div class="glass-card p-6 rounded-2xl">
            <h2 class="text-xl font-semibold mb-2">Service Name</h2>
            <p class="text-gray-400 text-sm">รายละเอียดบริการของคุณที่นี่ เน้นความเรียบง่ายและดูทันสมัย</p>
        </div>
    </main>

</body>
</html>
